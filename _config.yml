# ─────────────────────────────────────────────────────────────
# 🔧 GitHub Pages Deployment Config for NeureonMindFlux Lab
# Forces full build with custom base URL and proper routing
# Last updated: 2025-07-05
# ─────────────────────────────────────────────────────────────

# GitHub Pages URL settings
baseurl: "/test_main"       # ← Repo name (omit if using custom domain)
url: "https://hectormozo3110.github.io"

# Markdown engine and theme
markdown: kramdown
theme: minima

# Ensure these folders are processed
include:
  - assets
  - papers
  - _pages
  - _data
  - _includes
  - _layouts
  - _site
  - .well-known

# Output all standalone Markdown pages in _pages/
collections:
  pages:
    output: true
    permalink: /:path/

# Default layout for all Markdown pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# Force rebuild of future-dated content + strict build
safe: true
future: true
lsi: false
incremental: false
strict_front_matter: true

# Plugins (optional, can be removed if not used)
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

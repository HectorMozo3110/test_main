title: Neureonmindflux Research Lab
description: Official research site for advanced AI, quantum security, and post-quantum publications

# GitHub Pages settings
baseurl: ""  # Leave blank unless repo-based URL is used
url: ""       # Will auto-resolve in GitHub Pages

# Markdown engine and theme
markdown: kramdown
theme: minima

# Required folders for site generation
include:
  - assets
  - papers

# Collections setup
collections:
  pages:
    output: true

# Default layout configuration
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default

# Optional Jekyll settings
safe: true
future: true

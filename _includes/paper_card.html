<div class="paper-card">
  <h2>{{ paper.title }}</h2>
  <p><strong>Repository:</strong> <a href="{{ paper.repo_url }}" target="_blank">{{ paper.repo_name }}</a></p>
  <div class="paper-content">
    {{ paper.content }}
  </div>
  <p><a href="{{ paper.page_url }}" class="read-more-link">Read full paper →</a></p>
  <hr />
</div>

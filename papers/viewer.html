---
layout: default
title: Paper Viewer
paper_viewer: true
---

<div id="paper-page" class="paper-content">
  <p>Loading paper...</p>
</div>

<div id="bibtex-cite" style="margin-top: 40px;">
  <h2>📚 References</h2>
  <div class="bibtex-rendered"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/markdown-it@13.0.1/dist/markdown-it.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/markdown-it-footnote@3.0.3/dist/markdown-it-footnote.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/pcooksey/bibtex-js/bibtex.min.js"></script>

<script>
  const repoName = new URLSearchParams(window.location.search).get("repo");
  const USER_NAME = "HectorMozo3110";

  document.addEventListener("DOMContentLoaded", async () => {
    const container = document.getElementById("paper-page");

    const md = window.markdownit({
      html: true,
      linkify: true,
      typographer: true
    }).use(window.markdownitFootnote);

    const paperUrl = `https://raw.githubusercontent.com/${USER_NAME}/${repoName}/main/paper/paper.md`;

    try {
      let markdownText = await fetch(paperUrl).then(res => res.text());

      // Handle custom image sizes
      markdownText = markdownText.replace(
        /!\[([^\]]*)\]\(([^)]+)\)(\{[^}]+\})?/g,
        (match, alt, src, attrs) => {
          const fullUrl = `https://raw.githubusercontent.com/${USER_NAME}/${repoName}/main/paper/${src}`;
          let style = '';
          if (attrs && attrs.includes("width=")) {
            const width = attrs.match(/width=([0-9]+%?)/)?.[1];
            if (width) {
              style = ` style="max-width:${width}; height:auto;"`;
            }
          }
          return `<img alt="${alt}" src="${fullUrl}"${style} />`;
        }
      );

      const htmlContent = md.render(markdownText);
      container.innerHTML = htmlContent;

      // Render math
      renderMathInElement(container, {
        delimiters: [
          { left: "$$", right: "$$", display: true },
          { left: "$", right: "$", display: false }
        ]
      });

    } catch (err) {
      container.innerHTML = "<p>❌ Error loading paper.md</p>";
    }

    // Try to load .bib file
    const bibNames = ["references.bib", "paper.bib", "citations.bib"];
    for (let bibName of bibNames) {
      const bibUrl = `https://raw.githubusercontent.com/${USER_NAME}/${repoName}/main/paper/${bibName}`;
      try {
        const res = await fetch(bibUrl);
        if (!res.ok) continue;

        const bibText = await res.text();
        const script = document.createElement("script");
        script.type = "text/bibtex";
        script.text = bibText;
        document.body.appendChild(script);

        // Trigger bibtex-js render
        setTimeout(() => {
          const bib = new Bibtex();
          bib.render();
        }, 300);
        break; // Stop at first successful bib found
      } catch (err) {
        console.warn("No .bib loaded:", err);
      }
    }
  });
</script>
